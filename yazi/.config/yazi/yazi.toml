[manager]
ratio          = [ 1, 3, 4 ]
sort_by        = "natural"
show_hidden    = true
show_symlink   = true

[preview]
tab_size        = 4
max_width       = 600
max_height      = 900
image_filter    = "triangle"
image_quality   = 75

[opener]
edit = [
    { run = 'nvim "$@"', block = true, desc = "Edit" }
]
play = [
    { run = 'mpv "$@"', orphan = true, desc = "Play" }
]
pdf = [
    { run = 'zathura "$@"', orphan = true, desc = "View PDF" }
]
